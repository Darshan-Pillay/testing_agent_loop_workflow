<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Launcher</title>
  <script>
    (function () {
      var stored = localStorage.getItem('gh-launcher-theme');
      var resolved = stored !== null
        ? stored
        : (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
      document.documentElement.setAttribute('data-theme', resolved);
    })();
  </script>
  <style>
    :root { --accent: #238636; --accent-hover: #2ea043; }
  </style>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <button id="theme-toggle" aria-label="Toggle theme" aria-pressed="false" type="button">
    <span id="theme-toggle-icon" aria-hidden="true"></span>
  </button>
  <main>
    <h1>GitHub Search</h1>
    <section id="search-section">
      <input type="text" id="search-input" placeholder="Search GitHub repositories..." autocomplete="off" />
      <button type="button" id="search-button" disabled>Search</button>
    </section>
    <div id="results-container"></div>
  </main>
  <script src="github.js"></script>
</body>
</html>
